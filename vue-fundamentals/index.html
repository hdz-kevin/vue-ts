<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World with Vue!!</title>
</head>
<body>
    <!-- En este elemento se montará la aplicación de Vue -->
    <div id="app"></div>


    <!-- Cargar Vue desde el CDN (Content Delivery Network) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        // Desestructurar las funciones del objeto global Vue
        const { createApp, ref } = Vue;

        // Crear la instancia de la aplicación
        const app = createApp({
            template: `
                <h1>Hello World</h1>
                <p>Desde app.js</p> 
            `,
        });

        // Montar la aplicación en el elemento con id="app"
        app.mount('#app');
    </script>
</body>
</html>
