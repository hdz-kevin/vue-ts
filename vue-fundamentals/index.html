<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World with Vue!!</title>
</head>
<body>
    <!-- En este elemento se montará la aplicación de Vue -->
    <div id="app"></div>


    <!-- Cargar Vue desde el CDN (Content Delivery Network) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        // Desestructurar las funciones del objeto global Vue
        const { createApp, ref } = Vue;

        // Crear la instancia de la aplicación
        const app = createApp({
            template: `
                <h1>{{ message }}</h1>
                <p>- {{ author }}</p> 
            `,

            // La función setup se ejecuta tan pronto el componente se monta.
            setup() {
                // Usamos ref() para hacer que la variable sea reactiva.
                const message = ref("Hola, soy Goku!");
                const author = ref("Kakaroto");

                setTimeout(() => {
                    // Para modificar una variable reactiva, debemos usar su propiedad .value
                    message.value = "Hola, soy Batman!";
                    author.value = "Bruce Wayne";
                }, 2000);

                // Las propiedades que se retornan en setup son expuestas al template.
                return {
                    message,
                    author,
                }
            }
        });

        // Montar la aplicación en el elemento con id="app"
        app.mount('#app');
    </script>
</body>
</html>
